<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo</title>
  <link rel="stylesheet" href="./styles/styles.css">
</head>
<body class="panel-page">
  <header class="site-header">
    <div class="container header-content">
      <a class="brand" href="index.html" aria-label="Voltar para a pagina inicial">
        <div class="brand-badge">MSJ</div>
        <div>
          <h1>Painel Administrativo</h1>
          <p>Gerenciamento dinamico de produtos</p>
        </div>
      </a>

      <nav class="main-nav" aria-label="Navegacao do painel">
        <a href="index.html">Voltar ao site</a>
      </nav>
    </div>
  </header>

  <main class="panel-main">
    <div class="container panel-content">
      <section class="panel-card">
        <div class="panel-header">
          <span class="section-tag">Cadastro</span>
          <h2>Novo produto</h2>
        </div>

        <form id="form-produto" class="product-form">
          <div class="form-group">
            <label for="nome">Nome do produto</label>
            <input type="text" id="nome" name="nome" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="categoria">Categoria</label>
              <input type="text" id="categoria" name="categoria" required>
            </div>

            <div class="form-group">
              <label for="preco">Preco</label>
              <input type="number" step="0.01" min="0.01" id="preco" name="preco" required>
            </div>
          </div>

          <div class="form-group">
            <label for="descricao">Descricao</label>
            <textarea id="descricao" name="descricao" rows="4" required></textarea>
          </div>

          <div class="form-group">
            <label for="imagem">URL da imagem</label>
            <input
              type="url"
              id="imagem"
              name="imagem"
              placeholder="https://exemplo.com/imagem.jpg"
            >
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Salvar</button>
          </div>

          <p id="mensagem-formulario" class="feedback-message" hidden></p>
        </form>
      </section>

      <section class="panel-card">
        <div class="panel-header">
          <span class="section-tag">Produtos</span>
          <h2>Lista de produtos</h2>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Produto</th>
                <th>Categoria</th>
                <th>Preco</th>
                <th>Descricao</th>
                <th>Imagem</th>
                <th>Acoes</th>
              </tr>
            </thead>
            <tbody id="tabela-produtos"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script src="painel.js"></script>
</body>
</html>
