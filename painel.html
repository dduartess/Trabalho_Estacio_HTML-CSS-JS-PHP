<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo</title>
  <link rel="stylesheet" href="./styles/styles.css">
</head>
<body class="panel-page">
  <header class="site-header">
    <div class="container header-content">
      <div class="brand">
        <div class="brand-badge">MSJ</div>
        <div>
          <h1>Painel Administrativo</h1>
          <p>Gerenciamento dinâmico de produtos</p>
        </div>
      </div>

      <nav class="main-nav">
        <a href="index.html">Voltar ao site</a>
      </nav>
    </div>
  </header>

  <main class="panel-main">
    <div class="container panel-content">
      <section class="panel-card">
        <div class="panel-header">
          <span class="section-tag">Cadastro</span>
          <h2>Novo produto</h2>
        </div>

        <form id="form-produto" class="product-form">
          <div class="form-group">
            <label for="nome">Nome do produto</label>
            <input type="text" id="nome">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="categoria">Categoria</label>
              <input type="text" id="categoria">
            </div>

            <div class="form-group">
              <label for="preco">Preço</label>
              <input type="number" step="0.01" id="preco">
            </div>
          </div>

          <div class="form-group">
            <label for="descricao">Descrição</label>
            <textarea id="descricao" rows="4"></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Salvar</button>
          </div>

          <p id="mensagem-formulario"></p>
        </form>
      </section>

      <section class="panel-card">
        <div class="panel-header">
          <span class="section-tag">Produtos</span>
          <h2>Lista de produtos</h2>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Produto</th>
                <th>Categoria</th>
                <th>Preço</th>
                <th>Descrição</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabela-produtos"></tbody>
          </table>
        </div>
      </section>
    </div>
  </main>

  <script src="painel.js"></script>
</body>
</html>
